_min_copier_version: "9.0.0"
_envops:
  trim_blocks: true
  lstrip_blocks: true

# ============================================================
# Core tenant identity — always asked, feeds every component
# ============================================================
tenant_slug:
  type: str
  help: Tenant short name (lowercase, used in namespace/repo/resource naming)
  validator: >-
    {% if not (tenant_slug | regex_search('^[a-z][a-z0-9-]{1,28}$')) %}
    Must be 2–29 characters, lowercase letters/digits/hyphens only, starting with a letter.
    {% endif %}

tenant_display_name:
  type: str
  help: Human-readable tenant name (labels/annotations/tags)

ado_project:
  type: str
  help: Azure DevOps project this tenant's repos live in
  default: platform-tenants

ado_org_name:
  type: str
  help: Azure DevOps organisation name (the subdomain in dev.azure.com/<org>)

resource_tier:
  type: str
  help: Tenant sizing tier (drives CPU/mem/replica defaults)
  choices:
    - small
    - medium
    - large

environments:
  type: yaml
  help: Environments this tenant deploys to
  default: |
    - dev
    - staging
    - prod

# ============================================================
# Application list — each app gets its own discrete pair of repos:
#   {name}               → build repo (Dockerfile + build pipeline)
#   {name}-k8s-manifests → Kustomize config repo (manifests + pipeline)
#   {name}-argocd        → ArgoCD Application + sync pipeline
# Multiple apps and multiple instances of the same type are supported.
# Supported types: angular, react, springboot, go, python, dotnet
# ============================================================
apps:
  type: yaml
  help: >-
    Applications in this tenant. Each entry requires:
    name (unique lowercase slug), type (angular|react|springboot|go|python|dotnet),
    container_image (full registry path without tag).
  default: |
    - name: app
      type: springboot
      container_image: acr.azurecr.io/your-org/app-name

# ============================================================
# Config and ArgoCD settings — apply to all apps in this tenant
# ============================================================
key_vault_name:
  type: str
  help: Azure Key Vault name backing this tenant's ExternalSecret

argocd_target_revision:
  type: str
  help: Git revision (branch/tag) ArgoCD should track for this tenant
  default: main

# ============================================================
# App Gateway — optional dedicated listener on the shared gateway
# ============================================================
include_app_gateway:
  type: bool
  help: Does this tenant need a dedicated Azure Application Gateway listener?
  default: true

app_gateway_backend_fqdn:
  type: str
  help: Backend FQDN the App Gateway listener should route to
  when: "{{ include_app_gateway }}"

app_gateway_hostname:
  type: str
  help: Public hostname for the App Gateway listener (e.g. tenant.platform.example.com)
  when: "{{ include_app_gateway }}"

app_gateway_priority:
  type: int
  help: Routing rule priority on the shared Application Gateway (must be unique per gateway, 1–20000)
  when: "{{ include_app_gateway }}"

# ============================================================
# Post-generation tasks
# _generate.py is rendered by Copier into the output directory,
# run to scaffold per-app discrete repos under apps/, then deleted.
# ============================================================
_tasks:
  - "python3 _generate.py && rm _generate.py"

# ============================================================
# File/dir exclusion
# ============================================================
_exclude:
  - "{% if not include_app_gateway %}app-gateway{% endif %}"
