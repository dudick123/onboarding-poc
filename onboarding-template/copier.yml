_min_copier_version: "9.0.0"
_envops:
  trim_blocks: true
  lstrip_blocks: true

# ============================================================
# Core tenant identity — always asked, feeds every component
# ============================================================
tenant_slug:
  type: str
  help: Tenant short name (lowercase, used in namespace/repo/resource naming)

tenant_display_name:
  type: str
  help: Human-readable tenant name (labels/annotations/tags)

ado_project:
  type: str
  help: Azure DevOps project this tenant's repos live in
  default: platform-tenants

resource_tier:
  type: str
  help: Tenant sizing tier (drives CPU/mem/replica defaults)
  choices:
    - small
    - medium
    - large

environments:
  type: yaml
  help: Environments this tenant deploys to
  default: |
    - dev
    - staging
    - prod

# ============================================================
# Component selection — operator decides what this tenant needs.
# This is the actual onboarding-requirements structuring step.
# ============================================================
include_app_gateway:
  type: bool
  help: Does this tenant need a dedicated Azure Application Gateway listener?
  default: true

include_build_repo:
  type: bool
  help: Generate the container build repo (Dockerfile + build/push pipeline)?
  default: true

include_config_repo:
  type: bool
  help: Generate the Kustomize config repo (manifests + kustomize build pipeline)?
  default: true

include_argocd_app:
  type: bool
  help: Generate the ArgoCD Application manifest + sync pipeline?
  default: true

# ============================================================
# Component-specific follow-up questions — only asked when relevant
# ============================================================
container_image:
  type: str
  help: Container registry path (without tag) for this tenant's image
  when: "{{ include_build_repo or include_config_repo }}"

key_vault_name:
  type: str
  help: Azure Key Vault name backing this tenant's ExternalSecret
  when: "{{ include_config_repo }}"

app_gateway_backend_fqdn:
  type: str
  help: Backend FQDN the App Gateway listener should route to
  when: "{{ include_app_gateway }}"

app_gateway_hostname:
  type: str
  help: Public hostname for the App Gateway listener (e.g. tenant.platform.example.com)
  when: "{{ include_app_gateway }}"

argocd_target_revision:
  type: str
  help: Git revision (branch/tag) ArgoCD should track for this tenant
  default: main
  when: "{{ include_argocd_app }}"

# ============================================================
# File/dir exclusion — the mechanism that makes components optional.
# Each entry is templated; an empty render means "don't exclude".
# ============================================================
_exclude:
  - "{% if not include_app_gateway %}app-gateway{% endif %}"
  - "{% if not include_build_repo %}build-repo{% endif %}"
  - "{% if not include_config_repo %}config-repo{% endif %}"
  - "{% if not include_argocd_app %}argocd-app{% endif %}"
  - "{% if include_config_repo and 'staging' not in environments %}config-repo/{{ tenant_slug }}/overlays/staging{% endif %}"
  - "{% if include_config_repo and 'prod' not in environments %}config-repo/{{ tenant_slug }}/overlays/prod{% endif %}"
  - "{% if include_config_repo and 'dev' not in environments %}config-repo/{{ tenant_slug }}/overlays/dev{% endif %}"
