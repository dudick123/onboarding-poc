# Tenant onboarding request — committed to git for review before generation
tenant_slug: acme
tenant_display_name: "ACME Industries"
ado_project: platform-tenants
ado_org_name: my-org
resource_tier: large
environments:
  - dev
  - staging
  - prod

# Each app gets three discrete ADO repos:
#   {name}               — build repo (Dockerfile + build pipeline)
#   {name}-k8s-manifests — Kustomize config repo (manifests + pipeline)
#   {name}-argocd        — ArgoCD Application + sync pipeline
# Supported types: angular, react, springboot, go, python, dotnet
apps:
  - name: frontend
    type: angular
    container_image: acr.azurecr.io/acme/frontend
  - name: orders-api
    type: springboot
    container_image: acr.azurecr.io/acme/orders-api
  - name: inventory-api
    type: springboot
    container_image: acr.azurecr.io/acme/inventory-api

key_vault_name: kv-acme-prod
argocd_target_revision: main

include_app_gateway: true
app_gateway_backend_fqdn: acme-internal.svc.cluster.local
app_gateway_hostname: acme.platform.example.com
app_gateway_priority: 100
