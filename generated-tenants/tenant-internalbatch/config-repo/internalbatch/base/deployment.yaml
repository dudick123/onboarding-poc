apiVersion: apps/v1
kind: Deployment
metadata:
  name: internalbatch
  namespace: internalbatch
  labels:
    app: internalbatch
    platform.io/tier: small
spec:
  replicas: 1
  selector:
    matchLabels:
      app: internalbatch
  template:
    metadata:
      labels:
        app: internalbatch
    spec:
      containers:
        - name: internalbatch
          image: acr.azurecr.io/internalbatch/worker:latest
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: internalbatch-secrets
