apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: internalbatch-secrets
  namespace: internalbatch
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kv-internalbatch-prod-store
    kind: SecretStore
  target:
    name: internalbatch-secrets
  dataFrom:
    - extract:
        key: internalbatch
